<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng ký Nhân sự BIDV</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bidv-green: #006B68; --bidv-gold: #FFC62F; --bg-color: #f0f4f3; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); width: 100%; max-width: 400px; border-top: 6px solid var(--bidv-green); }
        .header { text-align: center; margin-bottom: 24px; }
        .header h2 { color: var(--bidv-green); margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: var(--bidv-green); font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ced4d3; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--bidv-green); box-shadow: 0 0 0 3px rgba(0,107,104,0.1); }
        .email-box { display: flex; align-items: center; }
        .email-box input { border-radius: 8px 0 0 8px; border-right: none; }
        .suffix { background: #e9ecef; padding: 12px; border: 1px solid #ced4d3; border-radius: 0 8px 8px 0; color: #495057; font-size: 14px; white-space: nowrap; }
        #btn { width: 100%; padding: 16px; background: var(--bidv-gold); border: none; border-radius: 8px; color: var(--bidv-green); font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 12px; box-shadow: 0 4px 12px rgba(255,198,47,0.3); }
    </style>
</head>
<body>
    <div class="card">
        <div class="header"><h2>Hồ sơ nhân sự</h2><div style="height:2px; background:var(--bidv-gold); width:50px; margin:8px auto;"></div></div>
        <div class="form-group"><label>Họ và tên</label><input type="text" id="name" placeholder="Ví dụ: Nguyễn Văn A"></div>
        <label>Email BIDV</label>
        <div class="form-group email-box"><input type="text" id="email" placeholder="anv"><div class="suffix">@bidv.com.vn</div></div>
        <div class="form-group"><label>Số điện thoại</label><input type="tel" id="phone" placeholder="09xxxxxxxx"></div>
        <div class="form-group"><label>Đơn vị / Phòng ban</label><input type="text" id="unit" placeholder="Ví dụ: Ban Thư ký HĐQT"></div>
        <button id="btn" onclick="submit()">HOÀN TẤT ĐĂNG KÝ</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();
        function submit() {
            const d = {
                n: document.getElementById('name').value.trim(),
                e: document.getElementById('email').value.trim().toLowerCase() + "@bidv.com.vn",
                p: document.getElementById('phone').value.trim(),
                u: document.getElementById('unit').value.trim()
            };
            if(!d.n || d.e.includes("@bidv.com.vn@") || !d.p || !d.u) return alert("Vui lòng nhập đầy đủ thông tin!");
            tg.sendData(JSON.stringify(d));
            tg.close();
        }
    </script>
</body>
</html>
