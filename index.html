<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng ký Nhân sự BIDV</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bidv-green: #006B68; 
            --bidv-gold: #FFC62F; 
            --bg-gradient: linear-gradient(135deg, #f0f4f3 0%, #d9e2e1 100%);
        }
        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient); 
            margin: 0; padding: 15px; 
            display: flex; justify-content: center;
            min-height: 100vh;
        }
        .card { 
            background: white; padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 12px 40px rgba(0,60,58,0.15); 
            width: 100%; max-width: 400px; 
            border-top: 6px solid var(--bidv-green);
            align-self: flex-start;
            margin-top: 10px;
        }
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { color: var(--bidv-green); margin: 0; font-size: 22px; font-weight: 800; text-transform: uppercase; }
        .header p { color: #666; font-size: 13px; margin-top: 4px; font-weight: 500; }
        
        .form-group { margin-bottom: 18px; position: relative; }
        label { display: block; font-weight: 700; margin-bottom: 8px; color: var(--bidv-green); font-size: 14px; }
        
        input { 
            width: 100%; padding: 14px; 
            border: 1.5px solid #d1dbda; 
            border-radius: 12px; box-sizing: border-box; 
            font-size: 16px; outline: none; transition: all 0.3s ease;
            background-color: #fdfdfd;
        }
        input:focus { border-color: var(--bidv-green); box-shadow: 0 0 0 4px rgba(0,107,104,0.1); background-color: #fff; }
        
        /* Dropdown tìm kiếm */
        .search-container { position: relative; }
        .unit-list {
            position: absolute; width: 100%;
            max-height: 220px; overflow-y: auto;
            background: white; border: 1.5px solid var(--bidv-green);
            border-radius: 12px; z-index: 1000;
            display: none; box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            margin-top: 5px;
        }
        .unit-item {
            padding: 14px; cursor: pointer; border-bottom: 1px solid #f0f0f0;
            font-size: 15px; color: #333; transition: background 0.2s;
        }
        .unit-item:hover { background-color: #f0f7f6; color: var(--bidv-green); font-weight: 600; }
        .unit-item:last-child { border-bottom: none; }
        .no-result { color: #999; text-align: center; padding: 15px; pointer-events: none; }

        #btn { 
            width: 100%; padding: 16px; 
            background: var(--bidv-gold); border: none; 
            border-radius: 12px; color: var(--bidv-green); 
            font-weight: 800; font-size: 17px; cursor: pointer; 
            margin-top: 10px; transition: all 0.2s ease;
            box-shadow: 0 6px 20px rgba(255,198,47,0.4);
            text-transform: uppercase;
        }
        #btn:active { transform: scale(0.97); box-shadow: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h2>Hồ sơ nhân sự</h2>
            <p>Dự án Quản trị WBS - BIDV</p>
        </div>

        <div class="form-group">
            <label>Họ và tên</label>
            <input type="text" id="name" placeholder="Ví dụ: Nguyễn Văn A">
        </div>

        <div class="form-group">
            <label>Email BIDV (@bidv.com.vn)</label>
            <input type="text" id="email" placeholder="Nhập tên đăng nhập (ví dụ: anv)">
        </div>

        <div class="form-group">
            <label>Số điện thoại</label>
            <input type="tel" id="phone" placeholder="09xxxxxxxx">
        </div>

        <div class="form-group">
            <label>Đơn vị / Phòng ban</label>
            <div class="search-container">
                <input type="text" id="unitInput" placeholder="Gõ để tìm nhanh..." onfocus="showList()" oninput="filterUnits()" autocomplete="off">
                <div id="unitList" class="unit-list">
                    <div class="unit-item" onclick="selectUnit('Ban Thư ký & QHCĐ')">Ban Thư ký & QHCĐ</div>
                    <div class="unit-item" onclick="selectUnit('Ban Quản lý rủi ro')">Ban Quản lý rủi ro</div>
                    <div class="unit-item" onclick="selectUnit('Ban CNTT')">Ban CNTT</div>
                    <div class="unit-item" onclick="selectUnit('Trung tâm Ngân hàng số')">Trung tâm Ngân hàng số</div>
                    <div class="unit-item" onclick="selectUnit('Ban KH Cá nhân')">Ban KH Cá nhân</div>
                    <div class="unit-item" onclick="selectUnit('Ban KH Doanh nghiệp')">Ban KH Doanh nghiệp</div>
                    <div class="unit-item" onclick="selectUnit('Ban Pháp chế')">Ban Pháp chế</div>
                    <div class="unit-item" onclick="selectUnit('Ban Tài chính')">Ban Tài chính</div>
                    <div class="unit-item" onclick="selectUnit('Văn phòng HĐQT')">Văn phòng HĐQT</div>
                    <div class="unit-item" onclick="selectUnit('Ban Tổ chức nhân sự')">Ban Tổ chức nhân sự</div>
                    <div class="unit-item" onclick="selectUnit('Ban Kiểm tra kiểm soát nội bộ')">Ban Kiểm tra kiểm soát nội bộ</div>
                </div>
            </div>
        </div>

        <button id="btn" onclick="submit()">Hoàn tất đăng ký</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showList() {
            document.getElementById('unitList').style.display = 'block';
        }

        function filterUnits() {
            const input = document.getElementById('unitInput').value.toLowerCase();
            const items = document.getElementsByClassName('unit-item');
            let hasResult = false;

            for (let item of items) {
                if (item.textContent.toLowerCase().includes(input)) {
                    item.style.display = 'block';
                    hasResult = true;
                } else {
                    item.style.display = 'none';
                }
            }
            
            const list = document.getElementById('unitList');
            const noResId = 'no-res-msg';
            let noRes = document.getElementById(noResId);
            
            if (!hasResult) {
                if (!noRes) {
                    noRes = document.createElement('div');
                    noRes.id = noResId;
                    noRes.className = 'no-result';
                    noRes.textContent = 'Không tìm thấy đơn vị phù hợp';
                    list.appendChild(noRes);
                }
            } else if (noRes) {
                noRes.remove();
            }
        }

        function selectUnit(val) {
            document.getElementById('unitInput').value = val;
            document.getElementById('unitList').style.display = 'none';
        }

        document.addEventListener('click', function(e) {
            if (!document.querySelector('.search-container').contains(e.target)) {
                document.getElementById('unitList').style.display = 'none';
            }
        });

        function submit() {
            const name = document.getElementById('name').value.trim();
            let emailRaw = document.getElementById('email').value.trim().toLowerCase();
            const phone = document.getElementById('phone').value.trim();
            const unit = document.getElementById('unitInput').value.trim();

            // Xử lý làm sạch email: Nếu user gõ anv@bidv.com.vn -> chỉ lấy anv
            if (emailRaw.includes('@')) {
                emailRaw = emailRaw.split('@')[0];
            }

            if(!name || !emailRaw || !phone || !unit) {
                tg.showAlert("Vui lòng điền đầy đủ thông tin và chọn Đơn vị!");
                return;
            }

            const data = { 
                n: name, 
                e: emailRaw + "@bidv.com.vn", 
                p: phone, 
                u: unit 
            };

            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
